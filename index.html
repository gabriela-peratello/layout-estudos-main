<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias de IA</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header class="header">
        <h1 class="header_title">Últimas Notícias de IA</h1>
        <div class="header_controls">
            <div class="control-group">
                <label for="color-picker">Cor:</label>
                <input type="color" id="color-picker" class="control-group__input" />
            </div>

            <div class="control-group">

                <label for="font-select">Fonte:</label>
                <select id="font-select" class="control-group__select">
                    <option value="Roboto">Roboto</option>
                    <option value="Open Sans">Open Sans</option>
                    <option value="Montserrat">Montserrat</option>
                </select>
            </div>
            <div class="control-group"><label for="article-color-picker">Cor dos Artigos:</label>
                <input type="color" id="article-color-picker" class="control-group__input" />
            </div>

            <button id="theme-toggle" class="header__theme-toggle">
                <span class="material-icons">dark_mode</span>
            </button>
        </div>
    </header>
    <main class="main">

    </main>
</body>

</html>
